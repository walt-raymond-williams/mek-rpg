metadata:
  purpose: Machine-readable routing metadata for committed summaries, GM procedures, and mapped-only source targets.
  source_boundary: Do not answer rules from mapped-only entries; use them only to locate owned source pages or plan future summaries.
  status_legend:
    draft: Committed paraphrased summary or procedure exists with source pages, but it is not fully verified rules authority.
    source-reviewed-routing-aid: Committed routing aid reviewed against cited source pages; use for terminology/routing, not full rules procedures.
    mapped-only: Source range and candidate path are mapped, but no committed summary or procedure exists; non-authoritative.
    partial-draft: A committed summary covers adjacent or partial behavior, but the listed mapped topic still needs source review.
    source-lookup-only: Source location is recorded only for private lookup; do not summarize tables or record sheets wholesale.
    needs-source-review: Source review is required before using the entry for rules answers.
    TBD: Metadata is intentionally unresolved.

